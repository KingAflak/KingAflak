name: Update README cards

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Generate stats card (commits)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&theme=dark&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.PAT }}

      - name: Generate contributions card (total activity)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: contributions
          options: username=${{ github.repository_owner }}&theme=dark
          path: profile/contributions.svg
          token: ${{ secrets.PAT }}

      - name: Commit cards
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"
          git remote set-url origin https://${{ secrets.PAT }}@github.com/${{ github.repository }}.git
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push origin main
